<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Form</title>
  </head>
  <body>
    <header>
      <h1>Survey Form</h1>
    </header>
    <main>
      <form action="#" method="post">


        <label for="name">Enter your name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required  /><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" placeholder="Enter Age" min="1" required /><br><br>
        
        <p>Choose Your Gender:</p>

        <label for="male">Male</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="female">Female</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="other">Other</label>
        <input type="radio" id="other" name="gender" value="other">
        <br><br>

        <label for="email">Enter Your Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <br><br>

        <label for="phone">Phone number:</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter phone number" >
        <br><br>

        <label for="date">Enter Date:</label>
        <input type="date" id="date" name="date">
        <br><br>

        <label for="color">Choose your favorite color:</label>
        <input type="color" id="color" name="color">
        <br><br>

        <label for="Country">Choose Your Country:</label>
        <select name="Country" id="Country">
            <option value="">--Select Country--</option>
            <option value="India">India</option>
            <option value="United Kingdom">United Kingdom</option>
            <option value="France">France</option>
            <option value="Germany">Germany</option>
            <option value="Japan">Japan</option>
        </select>
        <br><br>

        <p>Choose your favorite hobbies:</p>

        <label for="gaming">Gaming</label>
        <input type="checkbox" id="gaming" value="Gaming" name="hobbies" ><br>
        <label for="singing">Singing</label>
        <input type="checkbox" id="singing" value="Singing" name="hobbies" ><br>
        <label for="reading">Reading</label>
        <input type="checkbox" id="reading" value="Reading" name="hobbies" ><br>
        <label for="drawing">Drawing</label>
        <input type="checkbox" id="drawing" value="Drawing" name="hobbies" ><br>

        <br>

        <label for="details">Enter your details:</label>
        <br>
        <textarea  id="details" name="details" rows="4" cols="30" placeholder="Enter text here...">
        </textarea>

        <br><br>

        <input type="submit" value="submit" >
      </form>
    </main>
    <footer></footer>
  </body>
</html>
