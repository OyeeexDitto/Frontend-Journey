<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unico_Reg</title>
    <link rel="stylesheet" href="student.css">
</head>
<body>
    <header>
        <h1>Student Registeration</h1>
    </header>
    <main>
        <form action="#" method="post">
            <label for="name">Enter name:</label>
            <input type="text" id="name" name="name" placeholder="Enter name" required>
            <br><br>

            <label for="roll">Enter registered roll number:</label>
            <input type="text" id="roll" name="roll" placeholder="Enter roll number" required>
            <br><br>

            <label for="email">Enter University email:</label>
            <input type="email" id="email" name="email" placeholder="Enter university email" required>
            <br><br>

            <label for="password">Enter pasword:</label>
            <input type="password" id="password" name="password" required>
            <br><br>

            <p>Select your Gender:</p>
            
            <label for="male">Male</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="female">Female</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="other">Other</label>
            <input type="radio" id="other" name="gender" value="other">
            <br><br>

            <label for="department">Select your department:</label>
            <select name="department" id="department">
                <option value="" selected disabled>--Select Department--</option>
                <option value="bca">BCA</option>
                <option value="btechcse">Btech CSE</option>
                <option value="btechai/ml">Btech AI/ML</option>
                <option value="ece">ECE</option>
                <option value="civil">Civil engineering</option>
            </select>
            <br><br>

            <p>Select your skills:</p>
            <label for="java">Java</label>
            <input type="checkbox" id="java" name="skills" value="java">
            <label for="python">Python</label>
            <input type="checkbox" id="python" name="skills" value="python">
            <label for="css">Css</label>
            <input type="checkbox" id="css" name="skills" value="css">
            <label for="html">HTML</label>
            <input type="checkbox" id="html" name="skills" value="html">
            <label for="js">JS</label>
            <input type="checkbox" id="js" name="skills" value="js">
            <label for="react">React</label>
            <input type="checkbox" id="react" name="skills" value="react">
            <br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob">
            <br><br>

            <label for="address">Enter address:</label>
            <br>
            <textarea name="address" id="address" rows="4" cols="30" placeholder="Enter here..."></textarea>
            <br><br>

            <input type="submit" value="submit">

            <input type="reset" value="reset">
           

           
        </form>
    </main>
    <footer></footer>
</body>
</html>
